name: Release

on:
  push:
    tags:
    - 'v[0-9]+.[0-9]+.[0-9]+'

permissions:
  contents: write      # create GitHub releases + upload assets
  id-token: write      # Cosign keyless OIDC signing

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  release:
    name: Build, sign, and publish release
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
      with:
        fetch-depth: 0

    - name: Install uv
      uses: astral-sh/setup-uv@fac544c07dec837d0ccb6301d7b5580bf5edae39 # v8.2.0

    - name: Set up Python
      run: uv python install

    - name: Install dependencies
      run: uv sync --extra dev

    - name: Lint (ruff)
      run: uv run ruff check src/ tests/

    - name: Format check (ruff)
      run: uv run ruff format --check src/ tests/

    - name: Type check (mypy)
      run: uv run mypy src/buckler/

    - name: Run tests (gate)
      run: uv run pytest tests/ -q

    - name: Extract version
      id: version
      run: |
        TAG="${GITHUB_REF_NAME}"
        VERSION="${TAG#v}"
        echo "tag=${TAG}" >> "$GITHUB_OUTPUT"
        echo "version=${VERSION}" >> "$GITHUB_OUTPUT"

    - name: Build release tarball
      run: |
        VERSION="${{ steps.version.outputs.version }}"
        TARBALL="buckler-${VERSION}.tar.gz"
        # Include source, packs, scripts, docs, and lock file (not .venv)
        tar -czf "$TARBALL" \
          --exclude='.venv' \
          --exclude='__pycache__' \
          --exclude='*.pyc' \
          --exclude='.pytest_cache' \
          --exclude='.ruff_cache' \
          --transform "s|^|buckler-${VERSION}/|" \
          src/ packs/ scripts/ docs/ \
          pyproject.toml uv.lock LICENSE README.md HUMANS.md AGENTS.md \
          CONTRIBUTING.md SECURITY.md ARCHITECTURE.md CHANGELOG.md
        echo "TARBALL=${TARBALL}" >> "$GITHUB_ENV"

    - name: Install Cosign
      uses: sigstore/cosign-installer@6f9f17788090df1f26f669e9d70d6ae9567deba6 # v4.1.2

    - name: Sign tarball (Cosign keyless)
      run: |
        cosign sign-blob "$TARBALL" \
          --bundle "${TARBALL}.bundle" \
          --yes

      # Org policy: no third-party release actions — use GitHub CLI (bundled on hosted runners).
    - name: Create GitHub Release
      env:
        GH_TOKEN: ${{ github.token }}
      run: |
        TAG="${{ steps.version.outputs.tag }}"
        VERSION="${{ steps.version.outputs.version }}"
        cat > release-notes.md <<EOF
        ## Buckler ${VERSION}

        ### Install

        \`\`\`bash
        curl -fsSL https://github.com/Rethunk-AI/buckler/releases/download/${TAG}/setup.sh | bash -s install
        \`\`\`

        ### Verify before run

        \`\`\`bash
        curl -fsSLO https://github.com/Rethunk-AI/buckler/releases/download/${TAG}/buckler-${VERSION}.tar.gz
        curl -fsSLO https://github.com/Rethunk-AI/buckler/releases/download/${TAG}/buckler-${VERSION}.tar.gz.bundle
        cosign verify-blob buckler-${VERSION}.tar.gz \\
          --bundle buckler-${VERSION}.tar.gz.bundle \\
          --certificate-identity-regexp "https://github.com/Rethunk-AI/buckler/.github/workflows/release.yml" \\
          --certificate-oidc-issuer "https://token.actions.githubusercontent.com"
        bash setup.sh install
        \`\`\`
        EOF
        gh release create "${TAG}" \
          --title "Buckler ${VERSION}" \
          --notes-file release-notes.md \
          --verify-tag \
          "${TARBALL}" "${TARBALL}.bundle" scripts/setup.sh
